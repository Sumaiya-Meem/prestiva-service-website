<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Prestiva">
  <!-- Navy badge with a gold monogram + ring, so the mark stays legible on both
       light and dark browser tabs (a single-colour logo disappears on dark). -->
  <rect width="64" height="64" rx="15" fill="#0A1628"/>
  <rect x="2" y="2" width="60" height="60" rx="13" fill="none" stroke="#D4A853" stroke-width="2" opacity="0.55"/>
  <text x="32" y="45" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700"
        fill="#D4A853">P</text>
</svg>
